services:
  backend:
    build: ./backend
    network_mode: host
    environment:
      - RELAY_GPIO_PIN=${RELAY_GPIO_PIN:-17}
      - DEMO_MODE=${DEMO_MODE:-false}
    restart: unless-stopped

  homebridge:
    build: ./homebridge
    network_mode: host
    volumes:
      - homebridge_data:/homebridge
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  homebridge_data:
